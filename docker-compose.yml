services:
  mysql:
    image: mysql:8.4
    container_name: mysql-clinica

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinica_veterinaria
      MYSQL_USER: usuario
      MYSQL_PASSWORD: senha123

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: