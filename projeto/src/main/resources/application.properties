# CONFIGURAÇÃO DO SERVIDOR
server.port=8080
server.servlet.context-path=/api

# CONFIGURAÇÃO DA FONTE DE DADOS (MYSQL)
spring.datasource.url=jdbc:mysql://localhost:3306/clube_assinatura_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURAÇÕES DO JPA / HIBERNATE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# AJUSTE DE TIMEZONE DA SERIALIZAÇÃO DE DATAS
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false